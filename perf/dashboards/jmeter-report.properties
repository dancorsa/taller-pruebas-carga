# Configuración del Dashboard HTML de JMeter
# Archivo de propiedades personalizadas para el generador de reportes
# Uso: jmeter -n -t plan.jmx -l results.jtl -q perf/dashboards/jmeter-report.properties -e -o report/

# ── Umbrales de latencia (milisegundos) ──────────────────────────────────────
# Los rangos colorean la tabla Statistics: verde / naranja / rojo
jmeter.reportgenerator.apdex_satisfied_threshold=200
jmeter.reportgenerator.apdex_tolerated_threshold=500

# ── Filtro de muestras ───────────────────────────────────────────────────────
# Incluir solo el sampler principal (excluir sub-muestras de recursos embebidos)
jmeter.reportgenerator.sample_filter=

# ── Granularidad de gráficas (milisegundos entre puntos) ────────────────────
# 5000 ms = un punto cada 5 segundos en las gráficas de tiempo
jmeter.reportgenerator.overall_granularity=5000

# ── Percentiles a mostrar en la tabla Statistics ────────────────────────────
jmeter.reportgenerator.report_title=Reporte de Pruebas de Carga – JMeter

# ── Configuración del gráfico de percentiles ────────────────────────────────
# Muestra p50, p90, p95, p99 en el gráfico de distribución
jmeter.reportgenerator.graph.responseTimePercentilesOverTime.property.set_granularity=5000

# ── Número máximo de muestras a retener en memoria ──────────────────────────
# Aumentar si hay muchas solicitudes (>100k) para evitar OutOfMemoryError
jmeter.reportgenerator.exporter.html.series_filter=

# ── Directorio de salida del reporte ────────────────────────────────────────
# Se sobreescribe con -o en la línea de comandos
#jmeter.reportgenerator.exporter.html.classname=org.apache.jmeter.report.dashboard.HtmlTemplateExporter
