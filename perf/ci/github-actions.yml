name: Performance Tests – JMeter

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base de la aplicación (sin protocolo)'
        required: false
        default: 'localhost'
      port:
        description: 'Puerto de la aplicación'
        required: false
        default: '8080'
  pull_request:
    branches:
      - main
      - master

jobs:
  performance-tests:
    name: Ejecutar Pruebas de Rendimiento con JMeter
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del código ──────────────────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # ── 2. Configurar Java ──────────────────────────────────────────────
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── 3. Instalar JMeter ──────────────────────────────────────────────
      - name: Instalar Apache JMeter 5.6.3
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz -C /opt/
          echo "/opt/apache-jmeter-5.6.3/bin" >> $GITHUB_PATH

      # ── 4. Levantar la aplicación registraduria ─────────────────────────
      # En CI, la aplicación debe estar disponible. Opciones:
      # a) Correrla como servicio en el mismo job (ver paso siguiente)
      # b) Usar una URL de entorno preexistente via PERF_BASE_URL secret
      - name: Levantar aplicación Spring Boot (modo CI)
        if: ${{ secrets.PERF_BASE_URL == '' }}
        run: |
          cd registraduria
          mvn clean spring-boot:run -Dspring-boot.run.jvmArguments="-Xmx512m" &
          echo "Esperando que la aplicación levante..."
          sleep 30
          curl -f http://localhost:8080/actuator/health || echo "Health check fallido, continuando..."

      # ── 5. Crear directorio de resultados ───────────────────────────────
      - name: Preparar directorio de resultados
        run: mkdir -p perf/results

      # ── 6. Ejecutar Prueba Baseline ─────────────────────────────────────
      - name: Ejecutar Baseline Test (10 VUs, 5 min)
        run: |
          BASE=${PERF_BASE_URL:-${{ github.event.inputs.base_url || 'localhost' }}}
          jmeter -n \
            -t perf/scripts/registro_personas_baseline.jmx \
            -JBASE_URL=${BASE} \
            -JPORT=${{ github.event.inputs.port || '8080' }} \
            -l perf/results/baseline.jtl \
            -e -o perf/results/baseline-report/ \
            -j perf/results/baseline_jmeter.log
        env:
          PERF_BASE_URL: ${{ secrets.PERF_BASE_URL }}

      # ── 7. Ejecutar Prueba Load ─────────────────────────────────────────
      - name: Ejecutar Load Test (hasta 100 VUs, 10 min)
        run: |
          BASE=${PERF_BASE_URL:-${{ github.event.inputs.base_url || 'localhost' }}}
          jmeter -n \
            -t perf/scripts/registro_personas_load.jmx \
            -JBASE_URL=${BASE} \
            -JPORT=${{ github.event.inputs.port || '8080' }} \
            -l perf/results/load.jtl \
            -e -o perf/results/load-report/ \
            -j perf/results/load_jmeter.log
        env:
          PERF_BASE_URL: ${{ secrets.PERF_BASE_URL }}

      # ── 8. Verificar SLOs con awk (quality gate) ────────────────────────
      - name: Verificar SLO – Error rate < 1%
        run: |
          # Calcular error rate del baseline desde el JTL
          ERRORS=$(awk -F',' 'NR>1 && $8=="false" {count++} END {print count+0}' perf/results/baseline.jtl)
          TOTAL=$(awk -F',' 'NR>1 {count++} END {print count+0}' perf/results/baseline.jtl)
          if [ "$TOTAL" -gt 0 ]; then
            ERROR_RATE=$(echo "scale=4; $ERRORS/$TOTAL*100" | bc)
            echo "Error rate: ${ERROR_RATE}%"
            FAIL=$(echo "$ERROR_RATE > 1.0" | bc -l)
            if [ "$FAIL" -eq 1 ]; then
              echo "❌ QUALITY GATE FALLO: Error rate ${ERROR_RATE}% supera el SLO de 1%"
              exit 1
            else
              echo "✅ Quality gate OK: Error rate ${ERROR_RATE}%"
            fi
          fi

      # ── 9. Publicar artefactos ──────────────────────────────────────────
      - name: Publicar resultados JTL y reportes HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results-${{ github.run_number }}
          path: |
            perf/results/baseline.jtl
            perf/results/load.jtl
            perf/results/baseline-report/
            perf/results/load-report/
            perf/results/*.log
          retention-days: 30

      # ── 10. Resumen en el job ───────────────────────────────────────────
      - name: Mostrar resumen de resultados
        if: always()
        run: |
          echo "## Resultados de Pruebas de Rendimiento" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f perf/results/baseline.jtl ]; then
            TOTAL=$(awk -F',' 'NR>1 {count++} END {print count+0}' perf/results/baseline.jtl)
            echo "- **Baseline**: ${TOTAL} solicitudes ejecutadas" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f perf/results/load.jtl ]; then
            TOTAL=$(awk -F',' 'NR>1 {count++} END {print count+0}' perf/results/load.jtl)
            echo "- **Load**: ${TOTAL} solicitudes ejecutadas" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Reportes HTML disponibles en los artefactos del job" >> $GITHUB_STEP_SUMMARY
